<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Worktree</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <!-- ext:css -->
</head>
<body>
  <main>
    <div id="tree" class="tree"></div>
  </main>
  <footer>
    <div class="row">
      <button id="btn-new-tab" type="button">+ Tab <span class="kbd">⌘T</span></button>
      <button id="btn-new-window" type="button">+ Window <span class="kbd">⌘N</span></button>
    </div>
    <div class="row">
      <button id="btn-split-vertical" type="button">⊢ Split <span class="kbd">⌘D</span></button>
      <button id="btn-split-horizontal" type="button">⊤ Split <span class="kbd">⌘⇧D</span></button>
    </div>
    <div class="row">
      <button id="btn-cheatsheet" type="button">iTerm Cheatsheet</button>
    </div>
    <div class="status hidden" id="status"></div>
  </footer>
  <script src="/static/app.js"></script>
  <!-- ext:js -->
</body>
</html>
