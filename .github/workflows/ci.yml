name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check iterm_workflow/
      - name: Format check
        run: ruff format --check iterm_workflow/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install mypy
        run: pip install mypy
      - name: Type check
        run: mypy iterm_workflow/

  validate-yaml:
    name: Validate project YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Validate
        run: |
          python - <<'EOF'
          import yaml, pathlib, sys
          errors = []
          for f in pathlib.Path("iterm_workflow/projects").glob("*.yaml"):
              try:
                  data = yaml.safe_load(f.read_text())
                  assert isinstance(data, dict), f"{f}: expected a mapping"
                  print(f"OK: {f.name}")
              except (yaml.YAMLError, AssertionError) as e:
                  errors.append(str(e))
          if errors:
              print("\n".join(errors), file=sys.stderr)
              sys.exit(1)
          EOF
